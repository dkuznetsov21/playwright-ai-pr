version: '3.8'

services:
  gemini-agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GH_TOKEN: ${GITHUB_TOKEN}
      GITHUB_REPO: ${GITHUB_REPO}
      GIT_USER_NAME: ${GIT_USER_NAME:-Gemini Agent}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-gemini@ci.local}
      TESTRAIL_URL: ${TESTRAIL_URL}
      TESTRAIL_USERNAME: ${TESTRAIL_USERNAME}
      TESTRAIL_API_KEY: ${TESTRAIL_API_KEY}
      TESTRAIL_PROJECT_ID: ${TESTRAIL_PROJECT_ID}
      TESTRAIL_CASE_ID: ${TESTRAIL_CASE_ID:-}
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/task-template.md}
    shm_size: '2gb'
    restart: "no"
    tty: true
